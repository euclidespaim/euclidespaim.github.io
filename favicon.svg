<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Hexagon Bracket / Circle -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ff007f" stroke-width="2" filter="url(#glow-pink)" />
  
  <!-- Outer accents -->
  <path d="M 16 2 L 16 5 M 16 27 L 16 30 M 2 16 L 5 16 M 27 16 L 30 16" stroke="#00f0ff" stroke-width="1.5" />

  <!-- CyberKid 'C' & 'K' stylized initials -->
  <!-- Letter C -->
  <path d="M 13 11 A 5 5 0 1 0 13 21" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-cyan)" />
  
  <!-- Letter K -->
  <path d="M 18 10 L 18 22 M 18 16 L 22 10 M 18 16 L 23 22" fill="none" stroke="#ff007f" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-pink)" />
</svg>
